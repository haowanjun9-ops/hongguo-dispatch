services:
  - type: web
    name: hongguo-dispatch
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "3000"
      # Render 自动生成一个随机访问密码；部署后可在 Dashboard → Environment 里查看/修改。
      - key: PASSCODE
        generateValue: true
    # 注意：免费实例不带持久盘，每次重新部署/重启后 data.json 会重置为初始种子数据。
    # 若要持久保存，请把实例升到付费计划，并在此文件里加 disk 配置（DATA_DIR=/data）。
